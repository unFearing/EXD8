name: sync-cosmos-to-foam

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Build API scripts
        run: npm run build
        working-directory: api

      - name: Sync Cosmos to Foam
        env:
          COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          COSMOS_DATABASE: ${{ secrets.COSMOS_DATABASE }}
          COSMOS_MECHS_CONTAINER: ${{ secrets.COSMOS_MECHS_CONTAINER }}
        run: npm run sync:cosmos-to-foam
        working-directory: api

      - name: Commit synced markdown
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mwo/mechs
          if git diff --staged --quiet; then
            echo "No markdown changes to commit"
          else
            git commit -m "chore(sync): pull mechs from cosmos into foam"
            git push
          fi
